version: "3.9"

services:
  luxefinder-api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: luxefinder-api
    command: sh -c "npm run prisma:push -w @luxefinder/api && npm run start -w @luxefinder/api"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/luxefinder
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://maisondeux.vip}
      EBAY_APP_ID: ${EBAY_APP_ID}
      EBAY_CERT_ID: ${EBAY_CERT_ID}
      EBAY_DEV_ID: ${EBAY_DEV_ID}
      EBAY_OAUTH_TOKEN: ${EBAY_OAUTH_TOKEN}
      EBAY_REDIRECT_URI: ${EBAY_REDIRECT_URI}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-production}
      EBAY_MARKETPLACE_ID: ${EBAY_MARKETPLACE_ID:-EBAY_US}
      EBAY_ACCOUNT_DELETION_ENDPOINT: ${EBAY_ACCOUNT_DELETION_ENDPOINT}
      EBAY_VERIFICATION_TOKEN: ${EBAY_VERIFICATION_TOKEN}
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/readyz || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    cpus: 1.00
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  luxefinder-worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: luxefinder-worker
    command: sh -c "npm run prisma:push -w @luxefinder/api && npm run start:worker -w @luxefinder/api"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/luxefinder
      REDIS_URL: redis://redis:6379
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SERPAPI_API_KEY: ${SERPAPI_API_KEY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://maisondeux.vip}
      EBAY_APP_ID: ${EBAY_APP_ID}
      EBAY_CERT_ID: ${EBAY_CERT_ID}
      EBAY_DEV_ID: ${EBAY_DEV_ID}
      EBAY_OAUTH_TOKEN: ${EBAY_OAUTH_TOKEN}
      EBAY_REDIRECT_URI: ${EBAY_REDIRECT_URI}
      EBAY_ENVIRONMENT: ${EBAY_ENVIRONMENT:-production}
      EBAY_MARKETPLACE_ID: ${EBAY_MARKETPLACE_ID:-EBAY_US}
      EBAY_ACCOUNT_DELETION_ENDPOINT: ${EBAY_ACCOUNT_DELETION_ENDPOINT}
      EBAY_VERIFICATION_TOKEN: ${EBAY_VERIFICATION_TOKEN}
    depends_on:
      - postgres
      - redis
    mem_limit: 1g
    cpus: 1.00
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: luxefinder-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: luxefinder
    volumes:
      - luxefinder_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d luxefinder"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    mem_limit: 2g
    cpus: 2.00
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: luxefinder-redis
    command: redis-server --appendonly yes
    volumes:
      - luxefinder_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    mem_limit: 512m
    cpus: 1.00
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    restart: unless-stopped

volumes:
  luxefinder_postgres_data:
  luxefinder_redis_data:
